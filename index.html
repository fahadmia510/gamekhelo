<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Gaming | Tournament</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #07070c; color: #fff; padding-bottom: 80px; }
        .header { background: #16162e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; position: sticky; top: 0; z-index: 1000; }
        .wallet-badge { background: #1f1f3d; padding: 5px 15px; border-radius: 20px; color: #ffcc00; border: 1px solid #ffcc00; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        .match-card { background: #16162e; border-radius: 15px; margin-bottom: 20px; overflow: hidden; border: 1px solid #2a2a4a; }
        .match-body { padding: 15px; }
        .match-title { font-size: 18px; color: #ffcc00; margin-bottom: 10px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .info-box { background: #0b0b1a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 2px solid #ffcc00; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-join { background: #ffcc00; color: #000; }
        .btn-check { background: #0088cc; color: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #16162e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #ffcc00; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0b1a; border: 1px solid #3f3f5f; border-radius: 8px; color: #fff; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #16162e; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ffcc00; }
        .nav-item { color: #aaa; text-align: center; font-size: 12px; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: #ffcc00; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:#ffcc00">CRYSTAL GAMING</h2>
        <div class="wallet-badge" id="displayBalance">৳ 0.00</div>
    </div>

    <div class="container">
        <div id="home" class="section active">
            <div class="match-card">
                <div class="match-body">
                    <div class="match-title">Free Fire Solo Battle</div>
                    <div class="info-grid">
                        <div class="info-box"><span>প্রাইজ</span><br><b>৳ ৫০০</b></div>
                        <div class="info-box"><span>এন্ট্রি</span><br><b>৳ ৫০</b></div>
                    </div>
                    <button class="btn btn-join" onclick="showSection('wallet')">JOIN NOW</button>
                </div>
            </div>
        </div>

        <div id="wallet" class="section">
            <div style="background:#1f1f3d; padding:15px; border-radius:10px; margin-bottom:15px; border-left:4px solid #ffcc00">
                <p>বিকাশ: 01941063121</p>
                <p>নগদ: 01604192939</p>
            </div>
            <input type="text" id="ignInput" placeholder="আপনার গেম আইডি (IGN)">
            <button class="btn btn-check" onclick="fetchBalance()">Balance Check</button>
            <hr style="margin:15px 0; border:0.5px solid #333">
            <input type="number" id="depAmount" placeholder="টাকার পরিমাণ">
            <input type="text" id="depTrx" placeholder="TxID">
            <button class="btn btn-join" style="background:#28a745; color:#fff" onclick="sendToTG()">ডিপোজিট রিকোয়েস্ট</button>
        </div>

        <div id="support" class="section">
            <div style="text-align:center; margin-top:50px">
                <i class="fab fa-telegram" style="font-size:50px; color:#0088cc"></i>
                <p style="margin-top:15px">সরাসরি কথা বলতে ক্লিক করুন</p>
                <a href="https://t.me/miafd150" class="btn btn-join" style="display:block; text-decoration:none; margin-top:20px">Telegram Support</a>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showSection('home', this)"><i class="fas fa-gamepad"></i><br>Play</div>
        <div class="nav-item" onclick="showSection('wallet', this)"><i class="fas fa-wallet"></i><br>Wallet</div>
        <div class="nav-item" onclick="showSection('support', this)"><i class="fas fa-headset"></i><br>Support</div>
    </div>

    <script>
        const SHEET_ID = '1CjM5ATkGzSGQpilbxecg3urDniu1wqyo5MhNNH2WJ2g';
        
        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
        }

        async function fetchBalance() {
            let ign = document.getElementById('ignInput').value;
            if(!ign) return alert("আগে গেম আইডি দিন");
            
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                let found = false;
                
                json.table.rows.forEach(row => {
                    if(row.c[0] && row.c[0].v == ign) {
                        document.getElementById('displayBalance').innerText = "৳ " + row.c[1].v;
                        alert("আপনার ব্যালেন্স: ৳ " + row.c[1].v);
                        found = true;
                    }
                });
                if(!found) alert("আইডি পাওয়া যায়নি!");
            } catch(e) { alert("Error connecting to database"); }
        }

        function sendToTG() {
            let ign = document.getElementById('ignInput').value;
            let am = document.getElementById('depAmount').value;
            let tx = document.getElementById('depTrx').value;
            if(!ign || !am || !tx) return alert("সব ঘর পূরণ করুন");
            window.location.href = `https://t.me/miafd150?text=Deposit Request:\nID: ${ign}\nAmount: ${am}\nTxID: ${tx}`;
        }
    </script>
</body>
</html>

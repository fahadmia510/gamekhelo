<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Tournament - Deposit</title>
    <style>
        body { background-color: #0f0f1b; color: white; font-family: Arial, sans-serif; text-align: center; }
        .container { margin-top: 50px; padding: 20px; border: 2px solid #ffd700; display: inline-block; border-radius: 15px; background: #1a1a2e; }
        h2 { color: #ffd700; }
        .payment-box { background: #252545; padding: 15px; border-radius: 10px; margin: 10px 0; }
        input, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #ffd700; color: black; font-weight: bold; cursor: pointer; }
        .telegram-btn { background: #0088cc; color: white; text-decoration: none; display: block; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>টাকা ডিপোজিট করুন</h2>
        <p>টুর্নামেন্টে অংশ নিতে নিচের নম্বরে টাকা পাঠিয়ে ফর্মটি পূরণ করুন।</p>

        <div class="payment-box">
            <p><strong>বিকাশ/নগদ (Personal): 017XXXXXXXX</strong></p>
        </div>

        <!-- রেজিস্ট্রেশন ও ডিপোজিট ফর্ম -->
        <form action="আপনার_টেলিগ্রাম_লিঙ্ক_বা_গুগল_ফর্ম_লিঙ্ক" method="POST">
            <input type="text" placeholder="ইউজার আইডি / গেমিং নেম" required>
            <input type="email" placeholder="আপনার ইমেইল" required>
            <input type="number" placeholder="কত টাকা পাঠিয়েছেন" required>
            <input type="text" placeholder="ট্রানজেকশন আইডি (TxID)" required>
            <button type="submit">ডিপোজিট রিকোয়েস্ট পাঠান</button>
        </form>

        <hr>
        <p>যেকোনো সমস্যায় যোগাযোগ করুন:</p>
        <a href="https://t.me/YourTelegramID" class="telegram-btn">সরাসরি টেলিগ্রাম সাপোর্ট</a>
    </div>

</body>
</html>

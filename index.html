<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Gaming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #07070c; color: #fff; }
        .header { background: #0b0b15; padding: 20px; text-align: center; border-bottom: 3px solid #ffcc00; }
        .header h1 { color: #ffcc00; text-transform: uppercase; font-size: 26px; }
        
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .tournament-card { background: #16162e; border-radius: 15px; overflow: hidden; border: 1px solid #2a2a4a; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* Fixed Gaming Banner Header */
        .card-img { width: 100%; height: 160px; background: linear-gradient(45deg, #000, #1a1a2e); display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #ffcc00; }
        .card-img::after { content: "TOURNAMENT LIVE"; color: #ffcc00; font-weight: bold; border: 2px solid #ffcc00; padding: 10px 20px; font-size: 20px; text-shadow: 0 0 10px #ffcc00; }
        
        .card-content { padding: 20px; }
        .card-content h3 { color: #ffcc00; margin-bottom: 15px; font-size: 20px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .info-item { background: #1f1f3d; padding: 10px; border-radius: 8px; font-size: 14px; border-left: 3px solid #ffcc00; }
        
        .join-btn { width: 100%; padding: 15px; background: #ffcc00; border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #16162e; padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; border: 2px solid #ffcc00; }
        .payment-box { background: #1f1f3d; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #ffcc00; text-align: left; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #07070c; border: 1px solid #3f3f5f; border-radius: 8px; color: #fff; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 14px; background: #28a745; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CRYSTAL GAMING</h1>
    </div>

    <div class="container">
        <div class="tournament-card">
            <div class="card-img"></div>
            <div class="card-content">
                <h3>Free Fire Solo Battle</h3>
                <div class="info-grid">
                    <div class="info-item">🏆 প্রাইজ: ৫০০ টাকা</div>
                    <div class="info-item">🎟️ এন্ট্রি: ৫০ টাকা</div>
                    <div class="info-item">🕒 সময়: ৯:০০ PM</div>
                    <div class="info-item">🗺️ ম্যাপ: বারমুডা</div>
                </div>
                <button class="join-btn" onclick="document.getElementById('pModal').style.display='flex'">JOIN NOW</button>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="https://t.me/miafd150" style="color: #0088cc; text-decoration: none; font-weight: bold;">💬 Support: @miafd150</a>
        </p>
    </div>

    <div id="pModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #ffcc00;">পেমেন্ট করুন</h2>
            <div class="payment-box">
                <p>বিকাশ: <b>01941063121</b></p>
                <p>নগদ: <b>01604192939</b></p>
            </div>
            <form onsubmit="event.preventDefault(); sendMsg();">
                <input type="text" id="name" placeholder="গেম আইডি (IGN)" required>
                <input type="number" id="taka" placeholder="টাকার পরিমাণ" required>
                <input type="text" id="trx" placeholder="ট্রানজেকশন আইডি (TxID)" required>
                <button type="submit" class="submit-btn">সাবমিট করুন</button>
                <button type="button" onclick="document.getElementById('pModal').style.display='none'" style="background:none; color:red; border:none; cursor:pointer; margin-top:10px;">বন্ধ করুন</button>
            </form>
        </div>
    </div>

    <script>
        function sendMsg() {
            let n = document.getElementById('name').value;
            let t = document.getElementById('taka').value;
            let x = document.getElementById('trx').value;
            let text = `New Registration:\nIGN: ${n}\nAmount: ${t}\nTxID: ${x}`;
            window.location.href = "https://t.me/miafd150?text=" + encodeURIComponent(text);
        }
    </script>
</body>
</html>
